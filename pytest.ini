[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --alluredir=allure-results
markers =
    entries: тесты эндпоинтов записей ассистента
    jira_sync: тесты синхронизации с Jira через ассистента
    jira_integration: интеграционные тесты прямого обращения к Jira